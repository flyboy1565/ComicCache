services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@comiccache.local}
      - DB_PATH=/data/comiccache.db
    volumes:
      - comiccache_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  comiccache_data:
